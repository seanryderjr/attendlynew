services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendly
      POSTGRES_PASSWORD: attendly
      POSTGRES_DB: attendly
    ports:
      - "5432:5432"
    volumes:
      - attendly_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendly -d attendly"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://attendly:attendly@db:5432/attendly?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-before-real-production-please}
      NODE_ENV: production
      PORT: 4000
      CLIENT_ORIGIN: ""
    ports:
      - "4000:4000"

volumes:
  attendly_pg:
