<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Attendly</title>
<style>
:root{--bg:#f7f8fb;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--brand:#2563eb;--brand2:#1d4ed8;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--soft:#eef4ff;--radius:18px;--shadow:0 10px 30px rgba(17,24,39,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f8fafc 0,#f3f6fb 100%);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.hide{display:none!important}.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:white;border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh}.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}.mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--brand),#60a5fa);display:grid;place-items:center;color:white;font-weight:900;font-size:22px;box-shadow:0 10px 20px rgba(37,99,235,.25)}.logo h1{font-size:22px;margin:0}.logo p{margin:0;color:var(--muted);font-size:12px}.nav button{width:100%;border:0;background:transparent;padding:12px 14px;border-radius:14px;margin:4px 0;text-align:left;font-weight:700;color:#374151;cursor:pointer;display:flex;gap:10px;align-items:center}.nav button.active,.nav button:hover{background:var(--soft);color:var(--brand2)}.sideFoot{position:absolute;left:22px;right:22px;bottom:22px}.main{padding:28px;max-width:1280px;width:100%;margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.eyebrow{color:var(--muted);font-size:13px;margin:0 0 4px}.title{font-size:34px;margin:0;letter-spacing:-.04em}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:white;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;color:#111827;box-shadow:0 2px 6px rgba(0,0,0,.03)}.btn:hover{border-color:#bfdbfe}.btn.primary{background:var(--brand);border-color:var(--brand);color:white}.btn.good{background:var(--green);border-color:var(--green);color:white}.btn.red{background:#fee2e2;color:#991b1b}.btn.ghost{box-shadow:none}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}.statCard{display:flex;align-items:center;justify-content:space-between}.statIcon{width:46px;height:46px;border-radius:16px;background:var(--soft);display:grid;place-items:center;font-size:22px}.statNum{font-size:32px;font-weight:900;letter-spacing:-.04em}.statLabel{color:var(--muted);font-weight:700}.section{margin-top:18px}.sectionHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sectionHead h2{font-size:20px;margin:0}.sub{color:var(--muted);font-size:14px;margin:4px 0 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.pill{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 12px;font-weight:800;cursor:pointer}.pill.active{background:#111827;color:white}.form{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:14px}.form.three{grid-template-columns:repeat(3,minmax(0,1fr))}input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:11px 12px;background:white;font:inherit}textarea{min-height:88px;resize:vertical}table{width:100%;border-collapse:separate;border-spacing:0}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:white}th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:#f9fafb}td,th{text-align:left;padding:13px 14px;border-bottom:1px solid var(--line);white-space:nowrap}tr:last-child td{border-bottom:0}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.badge.active,.badge.approved{background:#dcfce7;color:#166534}.badge.inactive,.badge.denied{background:#fee2e2;color:#991b1b}.badge.pending{background:#fef3c7;color:#92400e}.badge.clock_in{background:#dbeafe;color:#1e40af}.badge.clock_out{background:#ede9fe;color:#5b21b6}.loginBg{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 10%,#dbeafe,transparent 32%),radial-gradient(circle at 90% 30%,#e0e7ff,transparent 30%),#f8fafc}.loginCard{width:min(460px,100%);padding:30px}.loginCard .mark{margin:auto}.center{text-align:center}.kiosk{max-width:760px;margin:0 auto}.pinInput{font-size:34px;text-align:center;letter-spacing:.25em;font-weight:900}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.keypad button{font-size:24px;padding:18px;border-radius:18px}.employeeHero{background:linear-gradient(135deg,#eff6ff,#fff);border:1px solid #bfdbfe}.toast{position:fixed;right:18px;bottom:18px;z-index:9;background:#111827;color:white;padding:14px 16px;border-radius:14px;box-shadow:var(--shadow);font-weight:800}.muted{color:var(--muted)}.rowActions{display:flex;gap:6px}.mobileNav{display:none}@media(max-width:900px){.shell{display:block}.side{display:none}.main{padding:16px}.mobileNav{display:flex;gap:8px;overflow:auto;padding:12px;background:white;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:3}.mobileNav button{white-space:nowrap}.grid{grid-template-columns:repeat(2,1fr)}.form,.form.three{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.title{font-size:28px}td,th{padding:10px}.actions{width:100%}.actions .btn{flex:1}.loginCard{padding:22px}}@media(max-width:520px){.grid{grid-template-columns:1fr}.card{padding:16px}.keypad button{padding:14px}.pinInput{font-size:26px}.rowActions{flex-direction:column}}
</style>
</head>
<body>
<div id="loginView" class="loginBg">
  <div class="card loginCard center">
    <div class="mark">A</div><h1>Attendly</h1><p class="muted">Streamlined employee time tracking and leave management.</p>
    <input id="email" value="admin@attendly.local" placeholder="Email" style="margin-top:16px"><input id="password" type="password" value="admin123!" placeholder="Password" style="margin-top:10px">
    <button class="btn primary" style="width:100%;margin-top:12px" onclick="login()">Login</button>
    <button class="btn" style="width:100%;margin-top:10px" onclick="showKioskOnly()">Employee PIN Entry</button><p id="loginMsg"></p>
  </div>
</div>
<div id="kioskView" class="loginBg hide"><div class="card kiosk"><div class="center"><div class="mark">A</div><h1>Employee Kiosk</h1><p class="muted">Enter your PIN to clock in/out or request time off.</p></div><input id="pin" class="pinInput" type="password" inputmode="numeric" placeholder="••••" maxlength="8"><div class="keypad" id="keys"></div><div class="actions" style="margin-top:14px"><button class="btn primary" onclick="punch()">Clock In / Out</button><button class="btn" onclick="employeeLogin()">Dashboard</button><button class="btn" onclick="showAdminLogin()">Admin Login</button></div><div id="kioskMsg"></div><div id="employeePanel" class="hide" style="margin-top:16px"></div></div></div>
<div id="appView" class="hide"><div class="mobileNav" id="mobileNav"></div><div class="shell"><aside class="side"><div class="logo"><div class="mark">A</div><div><h1>Attendly</h1><p>Admin Portal</p></div></div><nav class="nav" id="nav"></nav><div class="sideFoot"><button class="btn" style="width:100%" onclick="showKioskOnly()">Employee Kiosk</button><button class="btn ghost" style="width:100%;margin-top:8px" onclick="logout()">Logout</button></div></aside><main class="main"><div class="topbar"><div><p class="eyebrow" id="dateLine"></p><h1 class="title" id="pageTitle">Admin Dashboard</h1></div><div class="actions"><button class="btn" onclick="showKioskOnly()">Kiosk</button><button class="btn primary" onclick="loadAll()">Refresh</button></div></div><div id="content"></div></main></div></div><div id="toast" class="toast hide"></div>
<script>
let token=localStorage.attendlyToken||'', employees=[], punches=[], pto=[], dash={}, report={};
const $=id=>document.getElementById(id); const API=(p,o={})=>fetch(p,{...o,headers:{'Content-Type':'application/json',...(o.headers||{}),Authorization:'Bearer '+token}}).then(async r=>{let j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||r.statusText); return j});
const navs=[['dash','Dashboard','📊'],['employees','Employees','👥'],['punches','Punches','⏱️'],['timeoff','Time Off','🌴'],['balances','Balances','💼'],['reports','Reports','📈']]; let active='dash';
function toast(msg){$('toast').textContent=msg;$('toast').classList.remove('hide');setTimeout(()=>$('toast').classList.add('hide'),2600)}
function badge(v){let c=String(v).toLowerCase();return `<span class="badge ${c}">${String(v).replace('_',' ')}</span>`}
function initNav(){for(const wrap of [$('nav'),$('mobileNav')]) wrap.innerHTML=navs.map(n=>`<button onclick="go('${n[0]}')" class="${active==n[0]?'active':''}">${n[2]} ${n[1]}</button>`).join('')}
function go(id){active=id;initNav();render()} function show(el){['loginView','kioskView','appView'].forEach(id=>$(id).classList.add('hide'));$(el).classList.remove('hide')}
async function login(){try{let r=await API('/api/login',{method:'POST',body:JSON.stringify({email:$('email').value,password:$('password').value})});token=r.token;localStorage.attendlyToken=token;show('appView');await loadAll()}catch(e){$('loginMsg').innerHTML=`<span style="color:#b91c1c">${e.message}</span>`}}
function logout(){localStorage.removeItem('attendlyToken');token='';show('loginView')}function showKioskOnly(){show('kioskView')}function showAdminLogin(){show(token?'appView':'loginView'); if(token) loadAll()} 
async function loadAll(){try{[dash,employees,punches,pto,report]=await Promise.all([API('/api/dashboard'),API('/api/employees'),API('/api/punches'),API('/api/timeoff'),API('/api/reports/summary').catch(()=>({}))]);render();toast('Updated')}catch(e){toast(e.message)}}
function render(){initNav();$('dateLine').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});$('pageTitle').textContent=navs.find(n=>n[0]==active)?.[1]||'Attendly';const c=$('content'); if(active==='dash') c.innerHTML=dashView(); if(active==='employees') c.innerHTML=employeesView(); if(active==='punches') c.innerHTML=punchesView(); if(active==='timeoff') c.innerHTML=timeoffView(); if(active==='balances') c.innerHTML=balancesView(); if(active==='reports') c.innerHTML=reportsView();}
function dashView(){return `<div class="grid"><div class="card statCard"><div><div class="statNum">${dash.activeEmployees||0}</div><div class="statLabel">Active Employees</div></div><div class="statIcon">👥</div></div><div class="card statCard"><div><div class="statNum">${dash.todayPunches||0}</div><div class="statLabel">Today's Punches</div></div><div class="statIcon">⏱️</div></div><div class="card statCard"><div><div class="statNum">${dash.pendingRequests||0}</div><div class="statLabel">Pending Requests</div></div><div class="statIcon">🌴</div></div><div class="card statCard"><div><div class="statNum">${dash.totalEmployees||0}</div><div class="statLabel">Total Employees</div></div><div class="statIcon">📋</div></div></div><div class="section card"><div class="sectionHead"><div><h2>Recent Punch Activity</h2><p class="sub">Latest employee clock events</p></div></div>${punchTable(punches.slice(0,8))}</div>`}
function employeesView(){return `<div class="card"><div class="sectionHead"><div><h2>Employee Management</h2><p class="sub">Add, edit, activate, and manage employee PINs.</p></div></div><div class="form"><input id="newName" placeholder="Full name"><select id="newRole"><option>EMPLOYEE</option><option>MANAGER</option><option>TECHNICIAN</option><option>OFFICE</option></select><input id="newPin" placeholder="PIN"><select id="newPay"><option>Hourly</option><option>Salary</option></select><button class="btn primary" onclick="addEmployee()">Add Employee</button></div>${employeeTable()}</div>`}
function employeeTable(){return `<div class="tableWrap"><table><tr><th>Name</th><th>Role</th><th>PIN</th><th>Pay</th><th>Status</th><th></th></tr>${employees.map(e=>`<tr><td><input id="n${e.id}" value="${esc(e.name)}"></td><td><select id="r${e.id}">${opts(['EMPLOYEE','MANAGER','TECHNICIAN','OFFICE'],e.role)}</select></td><td>•••• ${e.pin_last4}</td><td><select id="pay${e.id}">${opts(['Hourly','Salary'],e.pay_type)}</select></td><td><select id="s${e.id}">${opts(['ACTIVE','INACTIVE'],e.status)}</select></td><td><div class="rowActions"><button class="btn" onclick="saveEmp(${e.id})">Save</button><button class="btn red" onclick="delEmp(${e.id})">Delete</button></div></td></tr>`).join('')}</table></div>`}
function punchesView(){return `<div class="card"><div class="sectionHead"><div><h2>Punch History</h2><p class="sub">Clock in/out records across the team.</p></div><a class="btn primary" href="/api/export/punches.csv">Export CSV</a></div>${punchTable(punches)}</div>`}
function punchTable(list){return `<div class="tableWrap"><table><tr><th>Employee</th><th>Type</th><th>Date</th><th>Time</th><th>Note</th></tr>${list.map(p=>{let d=new Date(p.occurred_at);return `<tr><td>${esc(p.employee_name||p.name||'')}</td><td>${badge(p.type)}</td><td>${d.toLocaleDateString()}</td><td>${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td><td>${esc(p.note||'')}</td></tr>`}).join('')||'<tr><td colspan=5>No punches yet.</td></tr>'}</table></div>`}
function timeoffView(){return `<div class="card"><div class="sectionHead"><div><h2>Time Off Requests</h2><p class="sub">Submit, approve, or deny leave requests.</p></div></div><div class="form"><select id="ptoEmp">${employees.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`)}</select><input id="ptoStart" type="date"><input id="ptoEnd" type="date"><input id="ptoHours" type="number" placeholder="Hours"><select id="ptoType"><option>Vacation</option><option>Sick</option><option>Personal</option></select></div><button class="btn primary" onclick="addPto()">Create Request</button><div style="height:14px"></div>${ptoTable()}</div>`}
function ptoTable(){return `<div class="tableWrap"><table><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Hours</th><th>Status</th><th>Actions</th></tr>${pto.map(x=>`<tr><td>${esc(x.employee_name)}</td><td>${esc(x.type)}</td><td>${String(x.start_date).slice(0,10)} → ${String(x.end_date).slice(0,10)}</td><td>${x.hours}</td><td>${badge(x.status)}</td><td><div class="rowActions"><button class="btn good" onclick="updatePto(${x.id},'APPROVED')">Approve</button><button class="btn red" onclick="updatePto(${x.id},'DENIED')">Deny</button></div></td></tr>`).join('')||'<tr><td colspan=6>No requests yet.</td></tr>'}</table></div>`}
function balancesView(){return `<div class="card"><div class="sectionHead"><div><h2>Leave Balances</h2><p class="sub">Vacation and sick hours by employee.</p></div></div><div class="tableWrap"><table><tr><th>Employee</th><th>Role</th><th>Vacation Hours</th><th>Sick Hours</th><th>Status</th></tr>${employees.map(e=>`<tr><td>${esc(e.name)}</td><td>${esc(e.role)}</td><td><b>${e.vacation_hours}</b></td><td><b>${e.sick_hours}</b></td><td>${badge(e.status)}</td></tr>`).join('')}</table></div></div>`}
function reportsView(){let roles=report.byRole||[], p=report.pto||[];return `<div class="grid"><div class="card"><h2>Employees by Role</h2>${roles.map(r=>`<p><b>${esc(r.role)}</b><br><span class="statNum">${r.count}</span></p>`).join('')||'<p class=muted>No data.</p>'}</div><div class="card"><h2>PTO Status</h2>${p.map(r=>`<p>${badge(r.status)} <b>${r.count}</b></p>`).join('')||'<p class=muted>No data.</p>'}</div><div class="card"><h2>Exports</h2><p class="muted">Download payroll and attendance-ready files.</p><a class="btn primary" href="/api/export/punches.csv">Download Punches CSV</a></div><div class="card"><h2>System</h2><p class="muted">Shared PostgreSQL data, mobile browser kiosk, and admin tools are active.</p></div></div><div class="section card"><h2>Recent Report Activity</h2>${punchTable((report.recent||[]).map(x=>({...x,employee_name:x.name})))}</div>`}
function opts(arr,sel){return arr.map(v=>`<option ${v==sel?'selected':''}>${v}</option>`).join('')}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
async function addEmployee(){await API('/api/employees',{method:'POST',body:JSON.stringify({name:$('newName').value,role:$('newRole').value,pin:$('newPin').value,pay_type:$('newPay').value})});await loadAll()}async function saveEmp(id){await API('/api/employees/'+id,{method:'PUT',body:JSON.stringify({name:$('n'+id).value,role:$('r'+id).value,status:$('s'+id).value,pay_type:$('pay'+id).value})});await loadAll()}async function delEmp(id){if(confirm('Delete employee?')){await API('/api/employees/'+id,{method:'DELETE'});await loadAll()}}
async function addPto(){await API('/api/timeoff',{method:'POST',body:JSON.stringify({employee_id:$('ptoEmp').value,start_date:$('ptoStart').value,end_date:$('ptoEnd').value,hours:$('ptoHours').value,type:$('ptoType').value})});await loadAll()}async function updatePto(id,status){await API('/api/timeoff/'+id,{method:'PUT',body:JSON.stringify({status})});await loadAll()}
function initKeys(){$('keys').innerHTML=[1,2,3,4,5,6,7,8,9,'←',0,'Clear'].map(k=>`<button class="btn" onclick="key('${k}')">${k}</button>`).join('')}function key(k){if(k==='Clear')$('pin').value='';else if(k==='←')$('pin').value=$('pin').value.slice(0,-1);else $('pin').value+=k}
async function punch(){try{let r=await fetch('/api/kiosk/punch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:$('pin').value})});let j=await r.json();if(!r.ok)throw new Error(j.error);$('kioskMsg').innerHTML=`<div class="card employeeHero center"><h2>${esc(j.employee.name)}</h2><p>${badge(j.punch.type)}</p><p class="muted">${new Date(j.punch.occurred_at).toLocaleString()}</p></div>`;$('pin').value=''}catch(e){$('kioskMsg').innerHTML=`<p style="color:#b91c1c;text-align:center"><b>${e.message}</b></p>`}}
async function employeeLogin(){try{let r=await fetch('/api/kiosk/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:$('pin').value})});let j=await r.json();if(!r.ok)throw new Error(j.error);$('employeePanel').classList.remove('hide');$('employeePanel').innerHTML=`<div class="card employeeHero"><h2>${esc(j.employee.name)}</h2><p>${esc(j.employee.role)} • ${j.clockedIn?'Currently clocked in':'Currently clocked out'}</p><div class="grid"><div class="card"><div class="statNum">${j.employee.vacation_hours}</div><div class="statLabel">Vacation Hours</div></div><div class="card"><div class="statNum">${j.employee.sick_hours}</div><div class="statLabel">Sick Hours</div></div></div><h3>Request Time Off</h3><div class="form"><input id="ekStart" type="date"><input id="ekEnd" type="date"><input id="ekHours" type="number" placeholder="Hours"><select id="ekType"><option>Vacation</option><option>Sick</option><option>Personal</option></select><button class="btn primary" onclick="kioskPto()">Submit</button></div><h3>Recent Activity</h3><div class="tableWrap"><table><tr><th>Type</th><th>Time</th></tr>${j.recent.map(p=>`<tr><td>${badge(p.type)}</td><td>${new Date(p.occurred_at).toLocaleString()}</td></tr>`).join('')}</table></div></div>`}catch(e){$('kioskMsg').innerHTML=`<p style="color:#b91c1c;text-align:center"><b>${e.message}</b></p>`}}
async function kioskPto(){try{let r=await fetch('/api/kiosk/timeoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:$('pin').value,start_date:$('ekStart').value,end_date:$('ekEnd').value,hours:$('ekHours').value,type:$('ekType').value})});let j=await r.json();if(!r.ok)throw new Error(j.error);toast('Request submitted')}catch(e){toast(e.message)}}
initKeys();initNav(); if(token){show('appView');loadAll()} else show('loginView');
</script>
</body>
</html>
