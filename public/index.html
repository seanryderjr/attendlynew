<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Attendly</title><style>
body{font-family:system-ui,Arial;margin:0;background:#f5f7fb;color:#111827}.top{background:#111827;color:white;padding:16px 22px;display:flex;justify-content:space-between;align-items:center}.wrap{max-width:1100px;margin:24px auto;padding:0 16px}.card{background:white;border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 2px 12px #0001}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.stat{font-size:30px;font-weight:800}.tabs button,.btn{border:0;border-radius:10px;padding:10px 14px;margin:4px;cursor:pointer;background:#e5e7eb}.tabs .active,.btn.primary{background:#2563eb;color:white}input,select,textarea{padding:10px;border:1px solid #d1d5db;border-radius:10px;margin:4px;max-width:100%}table{width:100%;border-collapse:collapse}td,th{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}.hide{display:none}.ok{color:#047857}.bad{color:#b91c1c}@media(max-width:700px){table{font-size:13px}.top{display:block}.card{padding:14px}}
</style></head><body><div class="top"><h2>Attendly</h2><div><button class="btn" onclick="showKiosk()">Kiosk</button><button class="btn" onclick="logout()">Logout</button></div></div><div class="wrap">
<div id="login" class="card"><h2>Admin Login</h2><input id="email" value="admin@attendly.local"><input id="password" type="password" value="admin123!"><button class="btn primary" onclick="login()">Login</button><p id="loginMsg"></p></div>
<div id="app" class="hide"><div class="tabs"><button onclick="tab('dash')" class="active">Dashboard</button><button onclick="tab('emps')">Employees</button><button onclick="tab('punches')">Punches</button><button onclick="tab('pto')">Time Off</button><button onclick="tab('balances')">Balances</button></div>
<section id="dash" class="card"><h2>Dashboard</h2><div id="stats" class="grid"></div></section>
<section id="emps" class="card hide"><h2>Employees</h2><div><input id="newName" placeholder="Employee name"><select id="newRole"><option>EMPLOYEE</option><option>MANAGER</option><option>TECHNICIAN</option><option>OFFICE</option></select><input id="newPin" placeholder="PIN"><button class="btn primary" onclick="addEmployee()">Add</button></div><div id="empTable"></div></section>
<section id="punches" class="card hide"><h2>Punches</h2><a class="btn" href="/api/export/punches.csv" onclick="this.href='/api/export/punches.csv?token='+token">Export CSV</a><div id="punchTable"></div></section>
<section id="pto" class="card hide"><h2>Time Off</h2><div><select id="ptoEmp"></select><input id="ptoStart" type="date"><input id="ptoEnd" type="date"><input id="ptoHours" type="number" placeholder="Hours"><select id="ptoType"><option>Vacation</option><option>Sick</option><option>Personal</option></select><button class="btn primary" onclick="addPto()">Request</button></div><div id="ptoTable"></div></section>
<section id="balances" class="card hide"><h2>Balances</h2><div id="balTable"></div></section></div>
<div id="kiosk" class="card hide"><h2>Employee Kiosk</h2><p>Enter PIN to clock in or out.</p><input id="pin" inputmode="numeric" type="password" placeholder="PIN"><button class="btn primary" onclick="punch()">Punch</button><button class="btn" onclick="showAdmin()">Admin</button><h3 id="kioskMsg"></h3></div>
</div><script>
let token=localStorage.token||'', employees=[]; const $=id=>document.getElementById(id);
async function api(path, opts={}){opts.headers={...(opts.headers||{}),'Content-Type':'application/json',Authorization:'Bearer '+token}; let r=await fetch(path,opts); if(!r.ok) throw new Error((await r.json().catch(()=>({error:r.statusText}))).error); return r.json();}
async function login(){try{let r=await api('/api/login',{method:'POST',body:JSON.stringify({email:$('email').value,password:$('password').value})}); token=r.token; localStorage.token=token; $('login').classList.add('hide');$('app').classList.remove('hide');loadAll();}catch(e){$('loginMsg').innerHTML='<span class=bad>'+e.message+'</span>'}}
function logout(){localStorage.removeItem('token');token='';location.reload()} function showKiosk(){$('login').classList.add('hide');$('app').classList.add('hide');$('kiosk').classList.remove('hide')} function showAdmin(){$('kiosk').classList.add('hide'); if(token){$('app').classList.remove('hide')}else $('login').classList.remove('hide')}
function tab(id){document.querySelectorAll('section').forEach(s=>s.classList.add('hide'));$(id).classList.remove('hide');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}
async function loadAll(){try{let d=await api('/api/dashboard');$('stats').innerHTML=Object.entries({Active:d.activeEmployees,'Today Punches':d.todayPunches,'Pending PTO':d.pendingRequests,Total:d.totalEmployees}).map(([k,v])=>`<div class=card><div class=stat>${v}</div><div>${k}</div></div>`).join(''); employees=await api('/api/employees'); renderEmployees(); renderBalances(); loadPunches(); loadPto();}catch(e){alert(e.message)}}
function renderEmployees(){ $('ptoEmp').innerHTML=employees.map(e=>`<option value=${e.id}>${e.name}</option>`).join(''); $('empTable').innerHTML='<table><tr><th>Name</th><th>Role</th><th>PIN</th><th>Status</th><th></th></tr>'+employees.map(e=>`<tr><td><input id=n${e.id} value="${e.name}"></td><td><select id=r${e.id}><option ${e.role=='EMPLOYEE'?'selected':''}>EMPLOYEE</option><option ${e.role=='MANAGER'?'selected':''}>MANAGER</option><option ${e.role=='TECHNICIAN'?'selected':''}>TECHNICIAN</option><option ${e.role=='OFFICE'?'selected':''}>OFFICE</option></select></td><td>${e.pin_last4}</td><td><select id=s${e.id}><option ${e.status=='ACTIVE'?'selected':''}>ACTIVE</option><option ${e.status=='INACTIVE'?'selected':''}>INACTIVE</option></select></td><td><button onclick="saveEmp(${e.id})">Save</button><button onclick="delEmp(${e.id})">Delete</button></td></tr>`).join('')+'</table>';}
function renderBalances(){ $('balTable').innerHTML='<table><tr><th>Name</th><th>Vacation</th><th>Sick</th></tr>'+employees.map(e=>`<tr><td>${e.name}</td><td>${e.vacation_hours}</td><td>${e.sick_hours}</td></tr>`).join('')+'</table>';}
async function addEmployee(){await api('/api/employees',{method:'POST',body:JSON.stringify({name:$('newName').value,role:$('newRole').value,pin:$('newPin').value})});$('newName').value='';$('newPin').value='';loadAll()}
async function saveEmp(id){await api('/api/employees/'+id,{method:'PUT',body:JSON.stringify({name:$('n'+id).value,role:$('r'+id).value,status:$('s'+id).value})});loadAll()}
async function delEmp(id){if(confirm('Delete employee?')){await api('/api/employees/'+id,{method:'DELETE'});loadAll()}}
async function loadPunches(){let p=await api('/api/punches');$('punchTable').innerHTML='<table><tr><th>Employee</th><th>Type</th><th>Time</th><th>Note</th></tr>'+p.map(x=>`<tr><td>${x.employee_name}</td><td>${x.type}</td><td>${new Date(x.occurred_at).toLocaleString()}</td><td>${x.note||''}</td></tr>`).join('')+'</table>'}
async function punch(){try{let r=await fetch('/api/kiosk/punch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:$('pin').value})});let j=await r.json();if(!r.ok)throw new Error(j.error);$('pin').value='';$('kioskMsg').innerHTML=`<span class=ok>${j.employee.name}: ${j.punch.type.replace('_',' ')}</span>`}catch(e){$('kioskMsg').innerHTML='<span class=bad>'+e.message+'</span>'}}
async function loadPto(){let p=await api('/api/timeoff');$('ptoTable').innerHTML='<table><tr><th>Employee</th><th>Dates</th><th>Hours</th><th>Status</th><th></th></tr>'+p.map(x=>`<tr><td>${x.employee_name}</td><td>${x.start_date.slice(0,10)} to ${x.end_date.slice(0,10)}</td><td>${x.hours}</td><td>${x.status}</td><td><button onclick="pto(${x.id},'APPROVED')">Approve</button><button onclick="pto(${x.id},'DENIED')">Deny</button></td></tr>`).join('')+'</table>'}
async function addPto(){await api('/api/timeoff',{method:'POST',body:JSON.stringify({employee_id:$('ptoEmp').value,start_date:$('ptoStart').value,end_date:$('ptoEnd').value,hours:$('ptoHours').value,type:$('ptoType').value})});loadPto()}
async function pto(id,status){await api('/api/timeoff/'+id,{method:'PUT',body:JSON.stringify({status})});loadPto();loadAll()}
if(token){$('login').classList.add('hide');$('app').classList.remove('hide');loadAll()}
</script></body></html>
