<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Attendly</title><style>
:root{--bg:#f6f7fb;--panel:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--brand:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706;--purple:#7c3aed}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eef4ff,#f8fafc)}.login-card{width:min(420px,92vw);background:white;padding:34px;border-radius:24px;box-shadow:0 20px 70px #0002}.brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:28px;margin-bottom:8px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:grid;place-items:center;color:white}.sub{color:var(--muted)}label{display:block;margin:14px 0 6px;font-weight:650}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:white}textarea{min-height:80px}.btn{border:0;border-radius:12px;padding:11px 14px;background:var(--brand);color:white;font-weight:700}.btn.secondary{background:#eef2ff;color:#1e40af}.btn.ghost{background:white;color:#374151;border:1px solid var(--line)}.btn.red{background:#fee2e2;color:#991b1b}.btn.green{background:#dcfce7;color:#166534}.btn.full{width:100%;margin-top:18px}.app{display:flex;min-height:100vh}.side{width:260px;background:#0f172a;color:#cbd5e1;padding:22px;position:fixed;inset:0 auto 0 0}.side .brand{font-size:24px;color:white}.nav{margin-top:25px;display:grid;gap:8px}.nav button{background:transparent;border:0;color:#cbd5e1;text-align:left;padding:12px;border-radius:12px;font-weight:700}.nav button.active,.nav button:hover{background:#1e293b;color:white}.main{margin-left:260px;flex:1}.top{height:76px;background:white;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:2}.content{padding:28px}.cards{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:16px}.card{background:white;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 20px #00000008}.metric{font-size:30px;font-weight:850;margin-top:8px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}.tabs button{border:1px solid var(--line);background:white;border-radius:999px;padding:9px 14px;font-weight:750}.tabs button.active{background:#111827;color:white}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.table-wrap{background:white;border:1px solid var(--line);border-radius:18px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:13px 14px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;background:#f9fafb}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}.active-pill{background:#dcfce7;color:#166534}.inactive-pill{background:#fee2e2;color:#991b1b}.pending{background:#fef3c7;color:#92400e}.approved{background:#dcfce7;color:#166534}.denied{background:#fee2e2;color:#991b1b}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}.actions{display:flex;gap:8px;flex-wrap:wrap}.modal{position:fixed;inset:0;background:#0007;display:grid;place-items:center;z-index:10;padding:18px}.modal-card{background:white;border-radius:20px;padding:22px;width:min(680px,96vw);max-height:90vh;overflow:auto}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kiosk{max-width:620px;margin:20px auto}.pin{font-size:34px;text-align:center;letter-spacing:10px;font-weight:900}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.keypad button{padding:20px;border:1px solid var(--line);background:white;border-radius:16px;font-size:24px;font-weight:800}.msg{padding:12px;border-radius:12px;margin-top:12px}.ok{background:#dcfce7;color:#166534}.err{background:#fee2e2;color:#991b1b}.mobile-menu{display:none}@media(max-width:900px){.side{display:none}.main{margin-left:0}.mobile-menu{display:inline-flex}.cards{grid-template-columns:repeat(2,1fr)}.grid,.form-grid{grid-template-columns:1fr}.top{padding:0 14px}.content{padding:16px}}@media(max-width:520px){.cards{grid-template-columns:1fr}.top h2{font-size:18px}.card{padding:14px}}
</style></head><body><div id="root"></div><script>
const API='';let token=localStorage.token||'';let user=JSON.parse(localStorage.user||'null');let state={page:'dashboard',employees:[],punches:[],timeoff:[],balances:[],reports:[],dash:{}};
const $=s=>document.querySelector(s); const fmt=d=>d?new Date(d).toLocaleString():''; const date=d=>d?new Date(d).toISOString().slice(0,10):''; const money=n=>Number(n||0).toFixed(2);
async function api(path,opts={}){const r=await fetch(API+path,{...opts,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(opts.headers||{})}});const txt=await r.text();let data;try{data=txt?JSON.parse(txt):{};}catch{data={error:txt}} if(!r.ok)throw new Error(data.error||'Request failed');return data;}
function appShell(){return `<div class="app"><aside class="side"><div class="brand"><span class="logo">A</span>Attendly</div><div class="sub">Time & Attendance</div><div class="nav">${['dashboard','kiosk','employees','punches','timeoff','balances','reports'].map(p=>`<button onclick="go('${p}')" class="${state.page==p?'active':''}">${label(p)}</button>`).join('')}</div></aside><main class="main"><div class="top"><div><h2 style="margin:0">${label(state.page)}</h2><div class="sub">${subtitle()}</div></div><div class="actions"><button class="btn ghost mobile-menu" onclick="mobileNav()">Menu</button><button class="btn ghost" onclick="logout()">Logout</button></div></div><div class="content" id="content"></div></main></div>`}
function label(p){return {dashboard:'Dashboard',kiosk:'Employee Kiosk',employees:'Employees',punches:'Punches',timeoff:'Time Off',balances:'Balances',reports:'Reports'}[p]||p} function subtitle(){return user?`Signed in as ${user.name||user.email}`:''}
function mobileNav(){const p=prompt('Go to: dashboard, kiosk, employees, punches, timeoff, balances, reports',state.page); if(p)go(p)}
function loginView(){root.innerHTML=`<div class="login"><div class="login-card"><div class="brand"><span class="logo">A</span>Attendly</div><p class="sub">Admin login</p><form id="loginForm"><label>Email</label><input name="email" value="admin@attendly.local"><label>Password</label><input name="password" type="password" value="admin123!"><button class="btn full">Sign In</button><div id="loginMsg"></div></form></div></div>`; loginForm.onsubmit=async e=>{e.preventDefault();try{const d=await api('/api/login',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(loginForm)))});token=d.token;user=d.user;localStorage.token=token;localStorage.user=JSON.stringify(user);render();}catch(err){loginMsg.innerHTML=`<div class="msg err">${err.message}</div>`}}}
async function render(){if(!token)return loginView();root.innerHTML=appShell();await loadPage();}
async function go(p){state.page=p;render()} function logout(){localStorage.clear();token='';user=null;loginView()}
async function loadPage(){try{if(state.page==='dashboard')await dashboard(); if(state.page==='kiosk')kiosk(); if(state.page==='employees')await employees(); if(state.page==='punches')await punches(); if(state.page==='timeoff')await timeoff(); if(state.page==='balances')await balances(); if(state.page==='reports')await reports();}catch(e){content.innerHTML=`<div class="msg err">${e.message}</div>`}}
async function dashboard(){state.dash=await api('/api/dashboard');state.punches=await api('/api/punches');content.innerHTML=`<div class="cards">${card('Active Employees',state.dash.activeEmployees)}${card('Today\'s Punches',state.dash.todaysPunches)}${card('Pending Requests',state.dash.pendingRequests)}${card('Clocked In',state.dash.currentlyClockedIn)}${card('Total Employees',state.dash.totalEmployees)}</div><div class="grid" style="margin-top:18px"><div class="card"><h3>Recent Punches</h3>${smallPunchTable(state.punches.slice(0,8))}</div><div class="card"><h3>Quick Actions</h3><div class="actions"><button class="btn" onclick="go('kiosk')">Open Kiosk</button><button class="btn secondary" onclick="go('employees')">Manage Employees</button><button class="btn ghost" onclick="go('reports')">View Reports</button></div></div></div>`}
function card(t,v){return `<div class="card"><div class="sub">${t}</div><div class="metric">${v}</div></div>`}
function smallPunchTable(rows){return `<table><tr><th>Employee</th><th>In</th><th>Out</th></tr>${rows.map(p=>`<tr><td>${p.employee_name}</td><td>${fmt(p.clock_in)}</td><td>${p.clock_out?fmt(p.clock_out):'<span class="pill active-pill">Open</span>'}</td></tr>`).join('')}</table>`}
function kiosk(){content.innerHTML=`<div class="card kiosk"><h2>Employee Clock In / Out</h2><p class="sub">Enter your employee PIN.</p><input id="pin" class="pin" readonly maxlength="8"><div class="keypad">${[1,2,3,4,5,6,7,8,9,'Clear',0,'Punch'].map(k=>`<button onclick="key('${k}')">${k}</button>`).join('')}</div><div id="kmsg"></div><hr style="border:0;border-top:1px solid var(--line);margin:22px 0"><h3>Request Time Off</h3><div class="form-grid"><input id="ptoPin" placeholder="PIN"><select id="ptoType"><option>Vacation</option><option>Sick</option><option>Personal</option></select><input id="ptoStart" type="date"><input id="ptoEnd" type="date"><input id="ptoHours" type="number" value="8"><input id="ptoReason" placeholder="Reason"></div><button class="btn full" onclick="submitPto()">Submit PTO Request</button></div>`}
window.key=async k=>{if(k==='Clear')pin.value=''; else if(k==='Punch'){try{const d=await api('/api/kiosk/punch',{method:'POST',body:JSON.stringify({pin:pin.value})});kmsg.innerHTML=`<div class="msg ok">${d.employee.name} clocked ${d.action}. ${fmt(d.punch.clock_in)}</div>`;pin.value='';}catch(e){kmsg.innerHTML=`<div class="msg err">${e.message}</div>`}} else pin.value+=k;}
window.submitPto=async()=>{try{await api('/api/time-off',{method:'POST',body:JSON.stringify({pin:ptoPin.value,type:ptoType.value,start_date:ptoStart.value,end_date:ptoEnd.value,hours:ptoHours.value,reason:ptoReason.value})});kmsg.innerHTML=`<div class="msg ok">PTO request submitted.</div>`}catch(e){kmsg.innerHTML=`<div class="msg err">${e.message}</div>`}}
async function employees(){state.employees=await api('/api/employees');content.innerHTML=`<div class="toolbar"><input id="search" placeholder="Search employees..." oninput="drawEmployees()" style="max-width:320px"><button class="btn" onclick="employeeModal()">Add Employee</button></div><div class="table-wrap"><table id="empTable"></table></div>`;drawEmployees()}
window.drawEmployees=()=>{let s=(search?.value||'').toLowerCase();let rows=state.employees.filter(e=>JSON.stringify(e).toLowerCase().includes(s));empTable.innerHTML=`<tr><th>Name</th><th>Role</th><th>PIN</th><th>Department</th><th>Status</th><th>Balances</th><th></th></tr>${rows.map(e=>`<tr><td><b>${e.name}</b><div class="sub">${e.email||''} ${e.phone||''}</div></td><td>${e.role}</td><td>${e.pin}</td><td>${e.department||''}</td><td><span class="pill ${e.status==='active'?'active-pill':'inactive-pill'}">${e.status}</span></td><td>Vac ${money(e.vacation)} | Sick ${money(e.sick)}</td><td><button class="btn ghost" onclick='employeeModal(${JSON.stringify(e)})'>Edit</button></td></tr>`).join('')}`}
window.employeeModal=(e=null)=>{modal(`<h3>${e?'Edit':'Add'} Employee</h3><form id="empForm" class="form-grid"><input name="name" placeholder="Name" value="${e?.name||''}"><input name="pin" placeholder="PIN" value="${e?.pin||''}"><input name="role" placeholder="Role" value="${e?.role||'Technician'}"><input name="department" placeholder="Department" value="${e?.department||'Field'}"><input name="email" placeholder="Email" value="${e?.email||''}"><input name="phone" placeholder="Phone" value="${e?.phone||''}"><select name="status"><option ${e?.status==='active'?'selected':''}>active</option><option ${e?.status==='inactive'?'selected':''}>inactive</option></select><input name="hourly_rate" type="number" step=".01" placeholder="Hourly Rate" value="${e?.hourly_rate||0}"></form><div class="actions" style="margin-top:14px"><button class="btn" onclick="saveEmp(${e?.id||0})">Save</button>${e?`<button class="btn red" onclick="delEmp(${e.id})">Delete</button>`:''}<button class="btn ghost" onclick="closeModal()">Cancel</button></div>`)}
window.saveEmp=async(id)=>{const body=Object.fromEntries(new FormData(empForm));await api('/api/employees'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(body)});closeModal();employees()}; window.delEmp=async(id)=>{if(confirm('Delete employee?')){await api('/api/employees/'+id,{method:'DELETE'});closeModal();employees()}}
async function punches(){state.punches=await api('/api/punches');state.employees=await api('/api/employees');content.innerHTML=`<div class="toolbar"><button class="btn" onclick="punchModal()">Add Manual Punch</button><button class="btn ghost" onclick="csv('punches')">Export CSV</button></div><div class="table-wrap"><table><tr><th>Employee</th><th>Clock In</th><th>Clock Out</th><th>Hours</th><th>Note</th><th></th></tr>${state.punches.map(p=>`<tr><td>${p.employee_name}</td><td>${fmt(p.clock_in)}</td><td>${p.clock_out?fmt(p.clock_out):'<span class="pill active-pill">Open</span>'}</td><td>${hours(p)}</td><td>${p.note||''}</td><td><button class="btn red" onclick="delPunch(${p.id})">Delete</button></td></tr>`).join('')}</table></div>`}
function hours(p){return ((new Date(p.clock_out||Date.now())-new Date(p.clock_in))/36e5).toFixed(2)}
window.punchModal=()=>modal(`<h3>Add Manual Punch</h3><form id="punchForm" class="form-grid"><select name="employee_id">${state.employees.map(e=>`<option value="${e.id}">${e.name}</option>`)}</select><input name="clock_in" type="datetime-local"><input name="clock_out" type="datetime-local"><input name="note" placeholder="Note"></form><div class="actions" style="margin-top:14px"><button class="btn" onclick="savePunch()">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`)
window.savePunch=async()=>{const b=Object.fromEntries(new FormData(punchForm));await api('/api/punches',{method:'POST',body:JSON.stringify(b)});closeModal();punches()}; window.delPunch=async(id)=>{if(confirm('Delete punch?')){await api('/api/punches/'+id,{method:'DELETE'});punches()}}
async function timeoff(){state.timeoff=await api('/api/time-off');content.innerHTML=`<div class="table-wrap"><table><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Hours</th><th>Reason</th><th>Status</th><th></th></tr>${state.timeoff.map(t=>`<tr><td>${t.employee_name}</td><td>${t.type}</td><td>${date(t.start_date)} to ${date(t.end_date)}</td><td>${t.hours}</td><td>${t.reason||''}</td><td><span class="pill ${t.status==='Approved'?'approved':t.status==='Denied'?'denied':'pending'}">${t.status}</span></td><td><button class="btn green" onclick="ptoStatus(${t.id},'Approved')">Approve</button> <button class="btn red" onclick="ptoStatus(${t.id},'Denied')">Deny</button></td></tr>`).join('')}</table></div>`}
window.ptoStatus=async(id,status)=>{await api('/api/time-off/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});timeoff()}
async function balances(){state.balances=await api('/api/balances');content.innerHTML=`<div class="table-wrap"><table><tr><th>Employee</th><th>Role</th><th>Vacation</th><th>Sick</th><th>Personal</th><th></th></tr>${state.balances.map(b=>`<tr><td>${b.employee_name}</td><td>${b.role}</td><td>${money(b.vacation)}</td><td>${money(b.sick)}</td><td>${money(b.personal)}</td><td><button class="btn ghost" onclick='balModal(${JSON.stringify(b)})'>Edit</button></td></tr>`).join('')}</table></div>`}
window.balModal=b=>modal(`<h3>Edit Balances</h3><p>${b.employee_name}</p><form id="balForm" class="form-grid"><input name="vacation" type="number" value="${b.vacation}"><input name="sick" type="number" value="${b.sick}"><input name="personal" type="number" value="${b.personal}"></form><div class="actions" style="margin-top:14px"><button class="btn" onclick="saveBal(${b.employee_id})">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`)
window.saveBal=async(id)=>{await api('/api/balances/'+id,{method:'PUT',body:JSON.stringify(Object.fromEntries(new FormData(balForm)))});closeModal();balances()}
async function reports(){state.reports=await api('/api/reports/summary');content.innerHTML=`<div class="toolbar"><button class="btn ghost" onclick="csv('reports')">Export CSV</button></div><div class="table-wrap"><table><tr><th>Employee</th><th>Role</th><th>Punches</th><th>Total Hours</th></tr>${state.reports.map(r=>`<tr><td>${r.name}</td><td>${r.role}</td><td>${r.punches}</td><td>${r.hours}</td></tr>`).join('')}</table></div>`}
window.csv=type=>{const rows=type==='reports'?state.reports:state.punches; const keys=Object.keys(rows[0]||{}); const data=[keys.join(','),...rows.map(r=>keys.map(k=>`"${String(r[k]??'').replaceAll('"','""')}"`).join(','))].join('\n'); const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'text/csv'}));a.download=type+'.csv';a.click();}
function modal(html){document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="modal"><div class="modal-card">${html}</div></div>`)} function closeModal(){modal?.remove()} window.closeModal=closeModal;
render();
</script></body></html>
