<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Attendly</title><style>
:root{font-family:Inter,system-ui,Segoe UI,Arial;color:#111827;background:#f6f8fb}*{box-sizing:border-box}body{margin:0}button,input,select,textarea{font:inherit}button{border:1px solid #d7deea;background:#fff;border-radius:10px;padding:9px 13px;font-weight:700;cursor:pointer}.primary{background:#2563eb;border-color:#2563eb;color:white}.green{background:#10b981;color:white;border-color:#10b981}.red{background:#ef4444;color:white;border-color:#ef4444}.app{display:flex;min-height:100vh}.side{width:240px;background:#0f172a;color:white;padding:20px;display:flex;flex-direction:column;gap:8px}.brand{font-size:23px;font-weight:900;margin-bottom:20px}.nav{color:#cbd5e1;background:transparent;border:0;text-align:left}.nav.active,.nav:hover{background:#1e293b;color:white}.logout{margin-top:auto}.main{flex:1;padding:26px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.top h1{margin:0;font-size:30px}.top p{margin:4px 0;color:#64748b}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.card,.panel,.modalCard,.loginCard{background:white;border:1px solid #e2e8f0;border-radius:18px;box-shadow:0 4px 18px #0f172a0a}.card{padding:20px}.card span{color:#64748b}.card b{display:block;font-size:34px;margin-top:8px}.panel{padding:18px;margin-top:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.toolbar{display:flex;justify-content:space-between;gap:12px;margin:12px 0}.search{border:1px solid #d7deea;border-radius:12px;padding:10px;min-width:280px}table{width:100%;border-collapse:collapse}th,td{padding:13px;border-bottom:1px solid #e5e7eb;text-align:left}th{font-size:12px;color:#64748b;background:#f8fafc;text-transform:uppercase}.pill{background:#e0f2fe;color:#075985;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eff6ff,#f8fafc)}.loginCard{width:min(420px,94vw);padding:32px;text-align:center}.login input,.form input,.form select,.form textarea{width:100%;border:1px solid #d7deea;border-radius:12px;padding:12px;margin:6px 0 10px}.error{background:#fee2e2;color:#991b1b;padding:10px;border-radius:10px;margin:10px 0}.notice{background:#dcfce7;color:#166534;padding:10px;border-radius:10px;margin:10px 0}.modal{position:fixed;inset:0;background:#0f172a66;display:grid;place-items:center;padding:20px}.modalCard{width:min(560px,96vw);padding:20px}.row{display:flex;gap:10px;align-items:center}.request,.balance{border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin:10px 0}.request{display:flex;justify-content:space-between;gap:10px;align-items:center}.kiosk{max-width:520px;margin:35px auto;text-align:center;background:white;border:1px solid #e5e7eb;border-radius:22px;padding:34px}.pin{font-size:32px;text-align:center;letter-spacing:8px;width:100%;border:1px solid #d7deea;border-radius:16px;padding:16px;margin:15px 0}@media(max-width:850px){.side{width:82px;padding:10px}.brand{font-size:18px}.nav{font-size:0}.main{padding:14px}.cards,.grid{grid-template-columns:1fr}table{display:block;overflow:auto}.toolbar{flex-direction:column}.search{min-width:0}}
</style></head><body><div id="root"></div><script type="module">
import React,{useEffect,useState}from'https://esm.sh/react@18.2.0';import{createRoot}from'https://esm.sh/react-dom@18.2.0/client';
const api=async(p,o={},token='')=>{let r=await fetch('/api'+p,{...o,headers:{'Content-Type':'application/json',Authorization:token?'Bearer '+token:'',...(o.headers||{})}});let j=await r.json().catch(()=>({}));if(!r.ok)throw Error(j.error||'Request failed');return j};
function App(){const[token,setToken]=useState(localStorage.token||''),[tab,setTab]=useState('Dashboard'),[data,setData]=useState({employees:[],punches:[],pto:[],balances:[],reports:[]}),[err,setErr]=useState('');async function load(){if(!token)return;try{setData(await api('/all',{},token));setErr('')}catch(e){setErr(e.message)}}useEffect(()=>{load()},[token]);if(!token)return <Login setToken={setToken}/>;let tabs=['Dashboard','Employees','Punches','Time Off','Balances','Reports','Kiosk'];return <div className="app"><aside className="side"><div className="brand">Attendly</div>{tabs.map(t=><button className={'nav '+(tab===t?'active':'')} onClick={()=>setTab(t)}>{t}</button>)}<button className="nav logout" onClick={()=>{localStorage.removeItem('token');setToken('')}}>Logout</button></aside><main className="main"><div className="top"><div><h1>{tab}</h1><p>Attendance, PTO, balances, and reports</p></div><button className="primary" onClick={load}>Refresh</button></div>{err&&<div className="error">{err}</div>}{tab==='Dashboard'&&<Dashboard d={data}/>} {tab==='Employees'&&<Employees d={data} token={token} load={load}/>} {tab==='Punches'&&<Punches d={data} token={token} load={load}/>} {tab==='Time Off'&&<PTO d={data} token={token} load={load}/>} {tab==='Balances'&&<Balances rows={data.balances}/>} {tab==='Reports'&&<Reports rows={data.reports}/>} {tab==='Kiosk'&&<Kiosk/>}</main></div>}
function Login({setToken}){const[email,setEmail]=useState('admin@attendly.local'),[password,setPassword]=useState('admin123!'),[err,setErr]=useState('');async function submit(e){e.preventDefault();try{let j=await api('/login',{method:'POST',body:JSON.stringify({email,password})});localStorage.token=j.token;setToken(j.token)}catch(e){setErr(e.message)}}return <div className="login"><form className="loginCard" onSubmit={submit}><h1>Attendly Admin</h1><p>Sign in to manage your team.</p>{err&&<div className="error">{err}</div>}<input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email"/><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password"/><button className="primary">Sign In</button></form></div>}
function Dashboard({d}){let active=d.employees.filter(e=>e.status==='Active').length,today=d.punches.filter(p=>new Date(p.clock_in).toDateString()===new Date().toDateString()).length,pending=d.pto.filter(p=>p.status==='Pending').length,open=d.punches.filter(p=>!p.clock_out).length;return <><div className="cards">{[['Active Employees',active],['Today’s Punches',today],['Pending Requests',pending],['Open Punches',open]].map(c=><div className="card"><span>{c[0]}</span><b>{c[1]}</b></div>)}</div><div className="grid"><Panel title="Recent Punches"><SimpleTable rows={d.punches.slice(0,6)} cols={['employee','role','clock_in','status']}/></Panel><Panel title="Pending Time Off"><SimpleTable rows={d.pto.filter(p=>p.status==='Pending').slice(0,6)} cols={['employee','type','start_date','status']}/></Panel></div></>}
function Employees({d,token,load}){const[edit,setEdit]=useState(null),[q,setQ]=useState('');let rows=d.employees.filter(e=>JSON.stringify(e).toLowerCase().includes(q.toLowerCase()));async function save(e){e.preventDefault();let body=Object.fromEntries(new FormData(e.currentTarget));await api(edit.id?'/employees/'+edit.id:'/employees',{method:edit.id?'PUT':'POST',body:JSON.stringify(body)},token);setEdit(null);load()}async function del(id){if(confirm('Delete employee?')){await api('/employees/'+id,{method:'DELETE'},token);load()}}return <><div className="toolbar"><input className="search" placeholder="Search employees" value={q} onChange={e=>setQ(e.target.value)}/><button className="primary" onClick={()=>setEdit({})}>Add Employee</button></div><Panel title="Employees"><table><thead><tr><th>Name</th><th>Role</th><th>Department</th><th>PIN</th><th>Status</th><th></th></tr></thead><tbody>{rows.map(e=><tr><td><b>{e.name}</b><br/><small>{e.email||e.phone}</small></td><td>{e.role}</td><td>{e.department}</td><td><code>{e.pin}</code></td><td><span className="pill">{e.status}</span></td><td><button onClick={()=>setEdit(e)}>Edit</button> <button onClick={()=>del(e.id)}>Delete</button></td></tr>)}</tbody></table></Panel>{edit&&<Modal title={edit.id?'Edit Employee':'Add Employee'} close={()=>setEdit(null)}><form className="form" onSubmit={save}>{['name','email','phone','role','department','pin'].map(k=><input name={k} placeholder={k} defaultValue={edit[k]||''} required={k==='name'||k==='pin'}/>)}<select name="status" defaultValue={edit.status||'Active'}><option>Active</option><option>Inactive</option></select><select name="pay_type" defaultValue={edit.pay_type||'Hourly'}><option>Hourly</option><option>Salary</option></select><button className="primary">Save</button></form></Modal>}</>}
function Punches({d,token,load}){const[show,setShow]=useState(false);async function save(e){e.preventDefault();await api('/punches',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget)))},token);setShow(false);load()}async function del(id){if(confirm('Delete punch?')){await api('/punches/'+id,{method:'DELETE'},token);load()}}return <><div className="toolbar"><button className="primary" onClick={()=>setShow(true)}>Manual Punch</button><button onClick={()=>csv(d.punches,'punches.csv')}>Export CSV</button></div><Panel title="Punch Records"><table><thead><tr><th>Employee</th><th>Role</th><th>Clock In</th><th>Clock Out</th><th>Status</th><th></th></tr></thead><tbody>{d.punches.map(p=><tr><td>{p.employee}</td><td>{p.role}</td><td>{fmt(p.clock_in)}</td><td>{fmt(p.clock_out)}</td><td><span className="pill">{p.status}</span></td><td><button onClick={()=>del(p.id)}>Delete</button></td></tr>)}</tbody></table></Panel>{show&&<Modal title="Manual Punch" close={()=>setShow(false)}><form className="form" onSubmit={save}><select name="employee_id">{d.employees.map(e=><option value={e.id}>{e.name}</option>)}</select><input name="clock_in" type="datetime-local"/><input name="clock_out" type="datetime-local"/><input name="notes" placeholder="Notes"/><button className="primary">Save</button></form></Modal>}</>}
function PTO({d,token,load}){async function status(id,s){await api('/pto/'+id,{method:'PUT',body:JSON.stringify({status:s})},token);load()}return <Panel title="Time Off Requests"><div>{d.pto.map(p=><div className="request"><div><b>{p.employee}</b><p>{p.type}: {p.start_date} to {p.end_date} · {p.hours}h</p><small>{p.reason}</small></div><span className="pill">{p.status}</span>{p.status==='Pending'&&<><button className="green" onClick={()=>status(p.id,'Approved')}>Approve</button><button className="red" onClick={()=>status(p.id,'Denied')}>Deny</button></>}</div>)}</div></Panel>}
function Balances({rows}){return <Panel title="Time Off Balances"><div className="grid">{rows.map(b=><div className="balance"><h3>{b.employee}</h3><p>Vacation: <b>{b.vacation}h</b></p><p>Sick: <b>{b.sick}h</b></p><p>Personal: <b>{b.personal}h</b></p></div>)}</div></Panel>}
function Reports({rows}){return <><div className="toolbar"><button className="primary" onClick={()=>csv(rows,'payroll.csv')}>Export Payroll</button></div><Panel title="Reports"><SimpleTable rows={rows} cols={['name','role','hours','punches']}/></Panel></>}
function Kiosk(){const[pin,setPin]=useState(''),[msg,setMsg]=useState(''),[pto,setPto]=useState(false);async function punch(){try{let j=await api('/kiosk/punch',{method:'POST',body:JSON.stringify({pin})});setMsg(j.message);setPin('')}catch(e){setMsg(e.message)}}async function req(e){e.preventDefault();try{await api('/kiosk/pto',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(e.currentTarget)))});setMsg('Request submitted');setPto(false)}catch(e){setMsg(e.message)}}return <div className="kiosk"><h2>Employee Kiosk</h2><p>Enter PIN to clock in/out.</p><input className="pin" value={pin} onChange={e=>setPin(e.target.value)} placeholder="PIN"/><button className="primary" onClick={punch}>Clock In / Out</button> <button onClick={()=>setPto(true)}>Request Time Off</button>{msg&&<div className="notice">{msg}</div>}{pto&&<Modal title="Request Time Off" close={()=>setPto(false)}><form className="form" onSubmit={req}><input name="pin" placeholder="PIN" required/><select name="type"><option>Vacation</option><option>Sick</option><option>Personal</option></select><input name="start_date" type="date" required/><input name="end_date" type="date" required/><input name="hours" type="number" defaultValue="8"/><textarea name="reason" placeholder="Reason"/><button className="primary">Submit</button></form></Modal>}</div>}
function Panel({title,children}){return <section className="panel"><h2>{title}</h2>{children}</section>}function Modal({title,close,children}){return <div className="modal"><div className="modalCard"><div className="row" style={{justifyContent:'space-between'}}><h2>{title}</h2><button onClick={close}>×</button></div>{children}</div></div>}function SimpleTable({rows,cols}){return <table><thead><tr>{cols.map(c=><th>{c.replace('_',' ')}</th>)}</tr></thead><tbody>{rows.map(r=><tr>{cols.map(c=><td>{c.includes('clock')?fmt(r[c]):String(r[c]??'')}</td>)}</tr>)}</tbody></table>}function fmt(v){return v?new Date(v).toLocaleString():''}function csv(rows,name){let s=[Object.keys(rows[0]||{}).join(','),...rows.map(r=>Object.values(r).map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(','))].join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([s],{type:'text/csv'}));a.download=name;a.click()}createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
