<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Attendly</title><style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#e7eaf0;--brand:#2563eb;--brand2:#1d4ed8;--green:#16a34a;--red:#dc2626;--amber:#d97706}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;border-radius:10px;padding:10px 14px;background:var(--brand);color:white;cursor:pointer}button.secondary{background:#eef2ff;color:#1e3a8a}button.danger{background:#fee2e2;color:#991b1b}button.good{background:#dcfce7;color:#166534}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#e0e7ff,#f8fafc)}.login-card{width:min(420px,92vw);background:white;border-radius:24px;padding:32px;box-shadow:0 20px 60px #1e293b25}.brand{display:flex;gap:12px;align-items:center}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--brand),#7c3aed);display:grid;place-items:center;color:white;font-weight:900}.field{display:grid;gap:6px;margin:12px 0}.field input,.field select,.field textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;background:#fff}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#0f172a;color:white;padding:22px;position:sticky;top:0;height:100vh}.side .muted{color:#94a3b8}.nav button{display:block;width:100%;text-align:left;margin:8px 0;background:transparent;color:#cbd5e1}.nav button.active,.nav button:hover{background:#1e293b;color:white}.main{padding:24px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.cards{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 24px #0f172a0a}.metric{font-size:32px;font-weight:800;margin-top:8px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tabs button{background:#fff;color:#334155;border:1px solid var(--line)}.tabs button.active{background:var(--brand);color:white;border-color:var(--brand)}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse}th,td{padding:13px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{font-size:12px;text-transform:uppercase;color:#64748b;background:#f8fafc}.pill{display:inline-flex;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:700}.Active,.Approved,.in{background:#dcfce7;color:#166534}.Inactive,.Denied,.out{background:#fee2e2;color:#991b1b}.Pending{background:#fef3c7;color:#92400e}.modal{position:fixed;inset:0;background:#0008;display:none;place-items:center;padding:20px}.modal.show{display:grid}.modal .card{width:min(560px,96vw)}.kiosk{max-width:520px;margin:25px auto}.pin{font-size:34px;text-align:center;letter-spacing:8px}.msg{padding:12px;border-radius:12px;margin:12px 0}.ok{background:#dcfce7;color:#166534}.err{background:#fee2e2;color:#991b1b}.hide{display:none!important}@media(max-width:900px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.cards,.grid2{grid-template-columns:1fr}.main{padding:14px}.top{display:block}}
</style></head><body><div id="root"></div><script>
const $=s=>document.querySelector(s), api=async(path,opt={})=>{let token=localStorage.token;let r=await fetch('/api'+path,{...opt,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(opt.headers||{})}});let j=await r.json().catch(()=>({}));if(!r.ok)throw Error(j.error||'Request failed');return j};
let state={tab:'Dashboard',data:{},edit:null};
function fmt(d){return d?new Date(d).toLocaleString():''} function date(d){return d?new Date(d).toLocaleDateString():''}
function csv(name,rows){if(!rows.length)return;let keys=Object.keys(rows[0]);let text=[keys.join(','),...rows.map(r=>keys.map(k=>'"'+String(r[k]??'').replaceAll('"','""')+'"').join(','))].join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'}));a.download=name;a.click()}
function render(){ if(!localStorage.token) return login(); document.body.innerHTML='<div id="root"></div>'; $('#root').innerHTML=`<div class="app"><aside class="side"><div class="brand"><div class="logo">A</div><div><h2 style="margin:0">Attendly</h2><div class="muted">Admin Portal</div></div></div><div class="nav" style="margin-top:24px">${['Dashboard','Kiosk','Employees','Punches','Time Off','Balances','Reports','Audit'].map(t=>`<button class="${state.tab==t?'active':''}" onclick="go('${t}')">${t}</button>`).join('')}</div><button class="danger" style="margin-top:24px;width:100%" onclick="logout()">Logout</button></aside><main class="main"><div class="top"><div><h1 style="margin:0">${state.tab}</h1><div style="color:#667085">Time tracking, PTO, balances, and reports</div></div><button onclick="load()">Refresh</button></div><div id="view"></div></main></div><div id="modal" class="modal"></div>`; draw(); }
function login(){document.body.innerHTML=`<div class="login"><div class="login-card"><div class="brand"><div class="logo">A</div><div><h1 style="margin:0">Attendly</h1><div style="color:#667085">Sign in to manage your team</div></div></div><form onsubmit="doLogin(event)" style="margin-top:22px"><div class="field"><label>Email</label><input id="email" value="admin@attendly.local"></div><div class="field"><label>Password</label><input id="pw" type="password" value="admin123!"></div><button style="width:100%;margin-top:12px">Sign In</button><div id="loginMsg"></div></form></div></div>`}
async function doLogin(e){e.preventDefault();try{let j=await api('/login',{method:'POST',body:JSON.stringify({email:$('#email').value,password:$('#pw').value})});localStorage.token=j.token;await load()}catch(err){$('#loginMsg').innerHTML='<div class="msg err">'+err.message+'</div>'}}
function logout(){localStorage.clear();login()} function go(t){state.tab=t;render();load()}
async function load(){try{let [summary,emps,punches,to,balances,reports,audit]=await Promise.allSettled(['/summary','/employees','/punches','/timeoff','/balances','/reports','/audit'].map(p=>api(p)));state.data={summary:summary.value||{},employees:emps.value||[],punches:punches.value||[],timeoff:to.value||[],balances:balances.value||[],reports:reports.value||[],audit:audit.value||[]};render()}catch(e){console.error(e);render()}}
function draw(){let v=$('#view');let d=state.data;if(state.tab==='Dashboard')v.innerHTML=`<div class="cards"><div class="card">Active Employees<div class="metric">${d.summary?.activeEmployees||0}</div></div><div class="card">Today's Punches<div class="metric">${d.summary?.todaysPunches||0}</div></div><div class="card">Pending Requests<div class="metric">${d.summary?.pendingRequests||0}</div></div><div class="card">Clocked In<div class="metric">${d.summary?.currentlyClockedIn||0}</div></div></div><div class="grid2" style="margin-top:16px"><div class="card"><h3>Recent Punches</h3>${table((d.punches||[]).slice(0,6),['employee_name','clock_in','clock_out'])}</div><div class="card"><h3>Pending Time Off</h3>${table((d.timeoff||[]).filter(x=>x.status==='Pending').slice(0,6),['employee_name','type','start_date','status'])}</div></div>`;
if(state.tab==='Kiosk')v.innerHTML=`<div class="card kiosk"><h2>Employee Kiosk</h2><p style="color:#667085">Enter your PIN to clock in or out.</p><input id="pin" class="pin" maxlength="8" placeholder="PIN"><button style="width:100%;margin-top:12px" onclick="punchPin()">Clock In / Out</button><div id="kmsg"></div><hr><h3>Request Time Off</h3><div class="field"><input id="tpin" placeholder="PIN"></div><div class="row"><input id="ts" type="date"><input id="te" type="date"><select id="tt"><option>Vacation</option><option>Sick</option><option>Personal</option></select></div><div class="field"><textarea id="tr" placeholder="Reason"></textarea></div><button class="secondary" onclick="kioskTO()">Submit Request</button></div>`;
if(state.tab==='Employees')v.innerHTML=`<div class="row" style="margin-bottom:12px"><button onclick="empForm()">Add Employee</button><button class="secondary" onclick='csv("employees.csv",state.data.employees)'>Export CSV</button><input id="search" placeholder="Search employees" oninput="draw()"></div>${empTable()}`;
if(state.tab==='Punches')v.innerHTML=`<div class="row" style="margin-bottom:12px"><button onclick="punchForm()">Add Manual Punch</button><button class="secondary" onclick='csv("punches.csv",state.data.punches)'>Export CSV</button></div>${table(d.punches||[],['employee_name','role','clock_in','clock_out','notes'],'punch')}`;
if(state.tab==='Time Off')v.innerHTML=`<button class="secondary" onclick='csv("time-off.csv",state.data.timeoff)'>Export CSV</button><br><br>${timeTable()}`;
if(state.tab==='Balances')v.innerHTML=`${balTable()}`;
if(state.tab==='Reports')v.innerHTML=`<button class="secondary" onclick='csv("reports.csv",state.data.reports)'>Export CSV</button><br><br>${table(d.reports||[],['name','punches','hours'])}`;
if(state.tab==='Audit')v.innerHTML=table(d.audit||[],['actor','action','details','created_at']);}
function table(rows,keys,type){return `<div class="table-wrap"><table><thead><tr>${keys.map(k=>`<th>${k.replaceAll('_',' ')}</th>`).join('')}${type==='punch'?'<th></th>':''}</tr></thead><tbody>${(rows||[]).map(r=>`<tr>${keys.map(k=>`<td>${k.includes('clock')||k==='created_at'?fmt(r[k]):k.includes('date')?date(r[k]):r[k]??''}</td>`).join('')}${type==='punch'?`<td><button class="danger" onclick="delPunch(${r.id})">Delete</button></td>`:''}</tr>`).join('')||`<tr><td colspan="${keys.length}">No records yet</td></tr>`}</tbody></table></div>`}
function empTable(){let q=($('#search')?.value||'').toLowerCase();let rows=(state.data.employees||[]).filter(e=>(e.name+e.role+e.pin).toLowerCase().includes(q));return `<div class="table-wrap"><table><thead><tr><th>Name</th><th>Role</th><th>Department</th><th>PIN</th><th>Email</th><th>Phone</th><th>Status</th><th></th></tr></thead><tbody>${rows.map(e=>`<tr><td><b>${e.name}</b></td><td>${e.role}</td><td>${e.department}</td><td>${e.pin}</td><td>${e.email||''}</td><td>${e.phone||''}</td><td><span class="pill ${e.status}">${e.status}</span></td><td><button class="secondary" onclick='empForm(${JSON.stringify(e)})'>Edit</button> <button class="danger" onclick="delEmp(${e.id})">Delete</button></td></tr>`).join('')}</tbody></table></div>`}
function timeTable(){return `<div class="table-wrap"><table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Hours</th><th>Reason</th><th>Status</th><th></th></tr></thead><tbody>${(state.data.timeoff||[]).map(t=>`<tr><td>${t.employee_name}</td><td>${t.type}</td><td>${date(t.start_date)} - ${date(t.end_date)}</td><td>${t.hours}</td><td>${t.reason||''}</td><td><span class="pill ${t.status}">${t.status}</span></td><td>${t.status==='Pending'?`<button class="good" onclick="toStatus(${t.id},'Approved')">Approve</button> <button class="danger" onclick="toStatus(${t.id},'Denied')">Deny</button>`:''}</td></tr>`).join('')}</tbody></table></div>`}
function balTable(){return `<div class="table-wrap"><table><thead><tr><th>Employee</th><th>Vacation</th><th>Sick</th><th>Personal</th><th></th></tr></thead><tbody>${(state.data.balances||[]).map(b=>`<tr><td>${b.name}</td><td><input id="v${b.id}" value="${b.vacation}" style="width:80px"></td><td><input id="s${b.id}" value="${b.sick}" style="width:80px"></td><td><input id="p${b.id}" value="${b.personal}" style="width:80px"></td><td><button onclick="saveBal(${b.id})">Save</button></td></tr>`).join('')}</tbody></table></div>`}
function empForm(e={}){show(`<h2>${e.id?'Edit':'Add'} Employee</h2>${['name','role','department','pin','email','phone'].map(k=>`<div class="field"><label>${k}</label><input id="f_${k}" value="${e[k]||''}"></div>`).join('')}<div class="field"><label>Status</label><select id="f_status"><option ${e.status==='Active'?'selected':''}>Active</option><option ${e.status==='Inactive'?'selected':''}>Inactive</option></select></div><button onclick="saveEmp(${e.id||0})">Save</button>`)}
async function saveEmp(id){let body={};['name','role','department','pin','email','phone','status'].forEach(k=>body[k]=$('#f_'+k).value);await api('/employees'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(body)});hide();load()}
function punchForm(){let opts=(state.data.employees||[]).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');show(`<h2>Manual Punch</h2><div class="field"><select id="pe">${opts}</select></div><div class="field"><label>Clock In</label><input id="pci" type="datetime-local"></div><div class="field"><label>Clock Out</label><input id="pco" type="datetime-local"></div><div class="field"><textarea id="pn" placeholder="Notes"></textarea></div><button onclick="savePunch()">Save</button>`)}
async function savePunch(){await api('/punches',{method:'POST',body:JSON.stringify({employee_id:$('#pe').value,clock_in:$('#pci').value||null,clock_out:$('#pco').value||null,notes:$('#pn').value})});hide();load()}
async function delPunch(id){if(confirm('Delete punch?')){await api('/punches/'+id,{method:'DELETE'});load()}} async function delEmp(id){if(confirm('Delete employee?')){await api('/employees/'+id,{method:'DELETE'});load()}}
async function punchPin(){try{let j=await api('/kiosk/punch',{method:'POST',body:JSON.stringify({pin:$('#pin').value})});$('#kmsg').innerHTML='<div class="msg ok">'+j.message+'</div>';$('#pin').value='';load()}catch(e){$('#kmsg').innerHTML='<div class="msg err">'+e.message+'</div>'}}
async function kioskTO(){try{await api('/kiosk/timeoff',{method:'POST',body:JSON.stringify({pin:$('#tpin').value,start_date:$('#ts').value,end_date:$('#te').value,type:$('#tt').value,reason:$('#tr').value})});alert('Request submitted');load()}catch(e){alert(e.message)}}
async function toStatus(id,status){await api('/timeoff/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});load()} async function saveBal(id){await api('/balances/'+id,{method:'PUT',body:JSON.stringify({vacation:$('#v'+id).value,sick:$('#s'+id).value,personal:$('#p'+id).value})});load()}
function show(html){$('#modal').className='modal show';$('#modal').innerHTML=`<div class="card">${html}<button class="secondary" style="float:right" onclick="hide()">Close</button></div>`} function hide(){$('#modal').className='modal';$('#modal').innerHTML=''}
load();
</script></body></html>
