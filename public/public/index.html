<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Attendly</title>
<style>
:root{--background:#fafafa;--foreground:#09090b;--card:#fff;--card-foreground:#09090b;--muted:#f4f4f5;--muted-foreground:#71717a;--border:#e4e4e7;--input:#e4e4e7;--primary:#18181b;--primary-foreground:#fafafa;--accent:#f4f4f5;--accent-foreground:#18181b;--destructive:#ef4444;--ring:#18181b;--radius:14px}*{box-sizing:border-box}body{margin:0;background:var(--background);color:var(--foreground);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}.hidden{display:none!important}a{color:inherit;text-decoration:none}.page{min-height:100vh}.container{max-width:1024px;margin:0 auto;padding:0 16px}.header{position:sticky;top:0;z-index:20;border-bottom:1px solid rgba(228,228,231,.7);background:rgba(255,255,255,.84);backdrop-filter:blur(10px)}.headerInner{height:73px;display:flex;align-items:center;justify-content:space-between;gap:14px}.headLeft{display:flex;align-items:center;gap:12px}.headTitle h1{font-size:18px;line-height:1.1;margin:0;font-weight:800}.headTitle p{font-size:12px;color:var(--muted-foreground);margin:3px 0 0}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--input);background:transparent;color:var(--foreground);height:36px;padding:0 14px;border-radius:12px;font-weight:600;font-size:14px;white-space:nowrap;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:.15s}.btn:hover{background:var(--accent)}.btn.icon{width:32px;height:32px;padding:0}.btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-foreground)}.btn.red{background:#fee2e2;border-color:#fecaca;color:#991b1b}.btn.green{background:#dcfce7;border-color:#bbf7d0;color:#166534}.btn.sm{height:30px;border-radius:10px;padding:0 10px;font-size:12px}.main{padding:24px 0 48px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 2px rgba(0,0,0,.04)}.stat{padding:22px}.statTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.statLabel{font-size:14px;font-weight:700;color:var(--muted-foreground)}.statNum{font-size:30px;line-height:1;font-weight:800;letter-spacing:-.04em}.statIcon{color:#a1a1aa}.tabs{display:grid;grid-template-columns:repeat(4,1fr);background:var(--muted);padding:4px;border-radius:12px;margin-bottom:18px}.tabs button{border:0;background:transparent;border-radius:10px;height:36px;font-weight:700;color:#71717a;cursor:pointer}.tabs button.active{background:white;color:#09090b;box-shadow:0 1px 2px rgba(0,0,0,.06)}.panel{padding:0}.tableWrap{overflow:auto}.table{width:100%;border-collapse:collapse}.table th{height:48px;text-align:left;padding:0 16px;color:var(--muted-foreground);font-size:13px;font-weight:700}.table td{padding:14px 16px;border-top:1px solid var(--border);vertical-align:middle;font-size:14px}.empCell{display:flex;align-items:center;gap:12px}.avatar{width:40px;height:40px;border-radius:50%;background:#f4f4f5;display:flex;align-items:center;justify-content:center;font-weight:800;color:#52525b}.role{color:var(--muted-foreground);font-size:13px;margin-top:2px}.badge{display:inline-flex;align-items:center;border-radius:999px;border:1px solid transparent;padding:3px 9px;font-size:12px;font-weight:700;text-transform:lowercase}.badge.active,.badge.approved{background:#dcfce7;color:#166534}.badge.inactive,.badge.denied{background:#fee2e2;color:#991b1b}.badge.pending{background:#fef3c7;color:#92400e}.badge.clock_in{background:#dbeafe;color:#1d4ed8}.badge.clock_out{background:#ede9fe;color:#6d28d9}.rowActions{display:flex;gap:6px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:18px}.form h3{grid-column:1/-1;margin:0 0 4px;font-size:18px}.form .full{grid-column:1/-1}input,select,textarea{width:100%;height:40px;border:1px solid var(--input);background:white;border-radius:10px;padding:0 12px;font:inherit}textarea{height:82px;padding:10px 12px;resize:vertical}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:0 0 14px}.search{max-width:320px}.empty{padding:32px;text-align:center;color:var(--muted-foreground)}.loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top left,#f4f4f5,transparent 34%),#fafafa}.loginCard{width:100%;max-width:430px;padding:28px;text-align:center}.logo{width:52px;height:52px;border-radius:16px;background:#18181b;color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;margin-bottom:12px}.loginCard h1{margin:0;font-size:28px}.muted{color:var(--muted-foreground)}.pin{font-size:32px;text-align:center;letter-spacing:.28em;font-weight:800;height:58px}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.keypad .btn{height:56px;font-size:20px;background:white}.empDash{max-width:760px;margin:0 auto}.welcome{padding:24px;background:linear-gradient(135deg,#fff,#f4f4f5)}.reportCards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}.smallList{padding:12px 18px}.smallItem{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--border);padding:12px 0}.smallItem:first-child{border-top:0}.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}.modalCard{width:min(560px,100%);max-height:88vh;overflow:auto}.modalHead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border)}.modalHead h2{margin:0;font-size:20px}.toast{position:fixed;right:18px;bottom:18px;background:#18181b;color:white;border-radius:12px;padding:12px 14px;font-weight:700;z-index:70}.mobileOnly{display:none}@media(max-width:760px){.container{padding:0 12px}.headerInner{height:auto;min-height:70px;align-items:flex-start;padding:14px 0}.headRight{display:flex;gap:8px;overflow:auto;max-width:100%}.stats,.reportCards,.grid2{grid-template-columns:1fr 1fr}.tabs{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}.form .full{grid-column:auto}.desktopWide{display:none}.mobileOnly{display:inline-flex}.table th,.table td{padding:12px 10px}.stat{padding:16px}}@media(max-width:520px){.stats,.reportCards{grid-template-columns:1fr}.headerInner{flex-direction:column}.headRight{width:100%}.headRight .btn{flex:1}.pin{font-size:25px}.rowActions{flex-direction:column}}
</style></head><body>
<div id="login" class="loginWrap"><div class="card loginCard"><div class="logo">A</div><h1>Attendly</h1><p class="muted">A streamlined, PIN-based employee kiosk portal for quick time-tracking and simple leave management.</p><div style="height:14px"></div><input id="email" value="admin@attendly.local" placeholder="Email"><div style="height:10px"></div><input id="password" type="password" value="admin123!" placeholder="Password"><div style="height:12px"></div><button class="btn primary" style="width:100%" onclick="login()">Login</button><div style="height:10px"></div><button class="btn" style="width:100%" onclick="showKiosk()">Employee PIN Entry</button><p id="loginMsg" class="muted"></p></div></div>
<div id="kiosk" class="loginWrap hidden"><div class="card loginCard empDash"><div class="logo">A</div><h1>Pin Entry</h1><p class="muted">Enter your employee PIN to access your dashboard or clock in/out.</p><input id="pin" class="pin" maxlength="8" inputmode="numeric" type="password" placeholder="••••"><div id="keys" class="keypad"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px"><button class="btn primary" onclick="punch()">Clock In / Out</button><button class="btn" onclick="employeeLogin()">Dashboard</button></div><button class="btn" style="width:100%;margin-top:10px" onclick="showLogin()">Admin Login</button><div id="kioskMsg" class="muted" style="margin-top:12px"></div><div id="empPanel" class="hidden" style="margin-top:16px;text-align:left"></div></div></div>
<div id="app" class="page hidden"><header class="header"><div class="container headerInner"><div class="headLeft"><button class="btn icon" onclick="showKiosk()">←</button><div class="headTitle"><h1 id="headTitle">Admin Panel</h1><p id="headSub">Manage employees & requests</p></div></div><div class="headRight"><button class="btn" onclick="go('reports')">↗ Reports</button><button class="btn primary" onclick="openEmployeeModal()">＋ Add Employee</button><button class="btn" onclick="logout()">Logout</button></div></div></header><main class="container main"><div id="content"></div></main></div>
<div id="modal" class="modal hidden"></div><div id="toast" class="toast hidden"></div>
<script>
let token=localStorage.attendlyToken||'', employees=[], punches=[], pto=[], dash={}, report={}, active='employees', editId=null;const $=id=>document.getElementById(id);const fmt=d=>new Date(d).toLocaleString();
async function API(path,opt={}){const res=await fetch(path,{...opt,headers:{'Content-Type':'application/json',...(opt.headers||{}),Authorization:'Bearer '+token}});let j={};try{j=await res.json()}catch{}if(!res.ok)throw new Error(j.error||res.statusText);return j}
function toast(m){$('toast').textContent=m;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),2200)}function badge(v){let c=String(v||'').toLowerCase();return `<span class="badge ${c}">${String(v).replace('_',' ')}</span>`}function initials(n){return String(n).split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase()}function show(id){['login','kiosk','app'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function showLogin(){show('login')}function showKiosk(){show('kiosk')}function logout(){localStorage.removeItem('attendlyToken');token='';showLogin()}
async function login(){try{const r=await API('/api/login',{method:'POST',body:JSON.stringify({email:$('email').value,password:$('password').value})});token=r.token;localStorage.attendlyToken=token;show('app');await loadAll()}catch(e){$('loginMsg').textContent=e.message}}
async function loadAll(){[dash,employees,punches,pto,report]=await Promise.all([API('/api/dashboard'),API('/api/employees'),API('/api/punches'),API('/api/timeoff'),API('/api/reports/summary')]);render()}function go(tab){active=tab;render()}function stat(n,l,i){return `<div class="card stat"><div class="statTop"><div class="statLabel">${l}</div><div class="statIcon">${i}</div></div><div class="statNum">${n}</div></div>`}
function shell(inner){$('headTitle').textContent=active==='reports'?'Reports':'Admin Panel';$('headSub').textContent=active==='reports'?'Time tracking analytics':'Manage employees & requests';$('content').innerHTML=`${active!=='reports'?`<div class="stats">${stat(dash.activeEmployees||0,'Active Employees','👥')}${stat(dash.todayPunches||0,"Today's Punches",'⏱')}${stat(dash.pendingRequests||0,'Pending Requests','☀')}${stat(dash.totalEmployees||0,'Total Employees','✓')}</div><div class="tabs"><button class="${active==='employees'?'active':''}" onclick="go('employees')">Employees</button><button class="${active==='punches'?'active':''}" onclick="go('punches')">Punches</button><button class="${active==='timeoff'?'active':''}" onclick="go('timeoff')">Time Off</button><button class="${active==='balances'?'active':''}" onclick="go('balances')">Balances</button></div>`:''}${inner}`}
function render(){if(active==='employees')return employeesView(); if(active==='punches')return punchesView(); if(active==='timeoff')return timeoffView(); if(active==='balances')return balancesView(); if(active==='reports')return reportsView()}
function employeesView(){shell(`<div class="toolbar"><input class="search" id="search" placeholder="Search employees..." oninput="employeesView()"><button class="btn primary" onclick="openEmployeeModal()">＋ Add Employee</button></div><div class="card tableWrap"><table class="table"><thead><tr><th>Employee</th><th>PIN</th><th>Status</th><th>Actions</th></tr></thead><tbody>${employees.filter(e=>!$('search')||!$('search').value||e.name.toLowerCase().includes($('search').value.toLowerCase())||e.role.toLowerCase().includes($('search').value.toLowerCase())).map(e=>`<tr><td><div class="empCell"><div class="avatar">${initials(e.name)}</div><div><div style="font-weight:800">${e.name}</div><div class="role">${e.role}</div></div></div></td><td style="font-weight:700">${e.pin_last4}</td><td>${badge(e.status)}</td><td><div class="rowActions"><button class="btn sm" onclick="openEmployeeModal(${e.id})">Edit</button><button class="btn sm red" onclick="delEmp(${e.id})">Delete</button></div></td></tr>`).join('')}</tbody></table></div>`)}
function punchesView(){shell(`<div class="toolbar"><h2 style="margin:0;font-size:18px">Punches</h2><button class="btn" onclick="location.href='/api/export/punches.csv'">Export CSV</button></div><div class="card tableWrap"><table class="table"><thead><tr><th>Employee</th><th>Type</th><th>Time</th><th>Note</th></tr></thead><tbody>${punches.map(p=>`<tr><td style="font-weight:700">${p.employee_name}</td><td>${badge(p.type)}</td><td>${fmt(p.occurred_at)}</td><td>${p.note||''}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">No punches yet</td></tr>'}</tbody></table></div>`)}
function timeoffView(){shell(`<div class="toolbar"><h2 style="margin:0;font-size:18px">Time Off Requests</h2><button class="btn primary" onclick="openPtoModal()">＋ Add Request</button></div><div class="card tableWrap"><table class="table"><thead><tr><th>Employee</th><th>Dates</th><th>Hours</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>${pto.map(r=>`<tr><td style="font-weight:700">${r.employee_name}</td><td>${r.start_date?.slice(0,10)} to ${r.end_date?.slice(0,10)}</td><td>${r.hours}</td><td>${r.type}</td><td>${badge(r.status)}</td><td><div class="rowActions"><button class="btn sm green" onclick="ptoStatus(${r.id},'APPROVED')">Approve</button><button class="btn sm red" onclick="ptoStatus(${r.id},'DENIED')">Deny</button></div></td></tr>`).join('')||'<tr><td colspan="6" class="empty">No requests yet</td></tr>'}</tbody></table></div>`)}
function balancesView(){shell(`<div class="card tableWrap"><table class="table"><thead><tr><th>Employee</th><th>Vacation</th><th>Sick</th><th>Pay Type</th></tr></thead><tbody>${employees.map(e=>`<tr><td><div class="empCell"><div class="avatar">${initials(e.name)}</div><div><div style="font-weight:800">${e.name}</div><div class="role">${e.role}</div></div></div></td><td>${e.vacation_hours||0} hrs</td><td>${e.sick_hours||0} hrs</td><td>${e.pay_type||''}</td></tr>`).join('')}</tbody></table></div>`)}
function reportsView(){shell(`<div class="reportCards">${stat(employees.length,'Employees','👥')}${stat(punches.length,'Punch Records','⏱')}${stat(pto.filter(x=>x.status==='PENDING').length,'Pending PTO','☀')}</div><div class="grid2"><div class="card"><div class="form"><h3>Employees by Role</h3></div><div class="smallList">${(report.byRole||[]).map(x=>`<div class="smallItem"><b>${x.role}</b><span>${x.count}</span></div>`).join('')}</div></div><div class="card"><div class="form"><h3>Recent Punches</h3></div><div class="smallList">${(report.recent||[]).map(x=>`<div class="smallItem"><b>${x.name}</b><span>${x.type.replace('_',' ')} · ${new Date(x.occurred_at).toLocaleTimeString()}</span></div>`).join('')||'<div class="empty">No punches yet</div>'}</div></div></div>`)}
function closeModal(){$('modal').classList.add('hidden');$('modal').innerHTML=''}function openEmployeeModal(id){const e=employees.find(x=>x.id===id)||{};editId=id||null;$('modal').innerHTML=`<div class="card modalCard"><div class="modalHead"><h2>${id?'Edit':'Add'} Employee</h2><button class="btn icon" onclick="closeModal()">×</button></div><div class="form"><input id="mName" placeholder="Name" value="${e.name||''}"><input id="mRole" placeholder="Role" value="${e.role||''}"><input id="mPin" placeholder="PIN${id?' (leave blank to keep)':''}"><select id="mStatus"><option ${e.status==='ACTIVE'?'selected':''}>ACTIVE</option><option ${e.status==='INACTIVE'?'selected':''}>INACTIVE</option></select><select id="mPay"><option ${e.pay_type==='Hourly'?'selected':''}>Hourly</option><option ${e.pay_type==='Flat Rate'?'selected':''}>Flat Rate</option><option ${e.pay_type==='Salary'?'selected':''}>Salary</option></select><input id="mVac" type="number" placeholder="Vacation hours" value="${e.vacation_hours||40}"><input id="mSick" type="number" placeholder="Sick hours" value="${e.sick_hours||24}"><button class="btn primary full" onclick="saveEmp()">Save Employee</button></div></div>`;$('modal').classList.remove('hidden')}
async function saveEmp(){const body={name:$('mName').value,role:$('mRole').value,status:$('mStatus').value,pay_type:$('mPay').value,vacation_hours:$('mVac').value,sick_hours:$('mSick').value};if($('mPin').value)body.pin=$('mPin').value;try{await API(editId?`/api/employees/${editId}`:'/api/employees',{method:editId?'PUT':'POST',body:JSON.stringify(body)});closeModal();toast('Saved');loadAll()}catch(e){toast(e.message)}}async function delEmp(id){if(confirm('Delete this employee?')){await API('/api/employees/'+id,{method:'DELETE'});loadAll()}}
function openPtoModal(){$('modal').innerHTML=`<div class="card modalCard"><div class="modalHead"><h2>Add Time Off Request</h2><button class="btn icon" onclick="closeModal()">×</button></div><div class="form"><select id="pEmp">${employees.map(e=>`<option value="${e.id}">${e.name}</option>`)}</select><input id="pStart" type="date"><input id="pEnd" type="date"><input id="pHours" type="number" placeholder="Hours"><select id="pType"><option>VACATION</option><option>SICK</option><option>PERSONAL</option></select><textarea id="pReason" class="full" placeholder="Reason"></textarea><button class="btn primary full" onclick="savePto()">Submit Request</button></div></div>`;$('modal').classList.remove('hidden')}async function savePto(){await API('/api/timeoff',{method:'POST',body:JSON.stringify({employee_id:$('pEmp').value,start_date:$('pStart').value,end_date:$('pEnd').value,hours:$('pHours').value,type:$('pType').value,reason:$('pReason').value})});closeModal();loadAll()}async function ptoStatus(id,status){await API('/api/timeoff/'+id,{method:'PUT',body:JSON.stringify({status})});loadAll()}
function keys(){let html=[1,2,3,4,5,6,7,8,9,'Clear',0,'⌫'].map(k=>`<button class="btn" onclick="key('${k}')">${k}</button>`).join('');$('keys').innerHTML=html}function key(k){let p=$('pin'); if(k==='Clear')p.value=''; else if(k==='⌫')p.value=p.value.slice(0,-1); else p.value+=k}async function punch(){try{const r=await API('/api/kiosk/punch',{method:'POST',body:JSON.stringify({pin:$('pin').value})});$('kioskMsg').innerHTML=`<b>${r.employee.name}</b> ${r.punch.type.replace('_',' ').toLowerCase()} recorded.`;$('pin').value=''}catch(e){$('kioskMsg').textContent=e.message}}async function employeeLogin(){try{const r=await API('/api/kiosk/login',{method:'POST',body:JSON.stringify({pin:$('pin').value})});$('empPanel').classList.remove('hidden');$('empPanel').innerHTML=`<div class="card welcome"><h2 style="margin-top:0">Welcome, ${r.employee.name}</h2><p class="muted">${r.employee.role} · ${r.clockedIn?'Currently clocked in':'Currently clocked out'}</p><div class="stats"><div><b>${r.employee.vacation_hours}</b><br><span class="muted">Vacation</span></div><div><b>${r.employee.sick_hours}</b><br><span class="muted">Sick</span></div></div></div>`}catch(e){$('kioskMsg').textContent=e.message}}
keys();if(token){show('app');loadAll().catch(()=>showLogin())}
</script></body></html>
