services:
  - type: web
    name: attendly-production
    runtime: docker
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: attendly-postgres
          property: connectionString

databases:
  - name: attendly-postgres
    plan: starter
